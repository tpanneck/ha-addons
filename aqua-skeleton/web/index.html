<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edlau — Thermisches Archiv</title>
  <link rel="stylesheet" href="uPlot.min.css">
  <style>
    body{font-family:system-ui,-apple-system,sans-serif;margin:1.2rem;color:#12253a}
    h1{font-size:1.3rem;margin:.2rem 0}
    .cards{display:flex;flex-wrap:wrap;gap:.6rem;margin:.8rem 0}
    .card{background:#f4f7ff;border:1px solid #dde3f5;border-radius:8px;padding:.5rem .8rem;min-width:8rem}
    .card b{display:block;font-size:1.25rem}
    .card small{color:#667}
    .muted{color:#667;font-size:.85rem}
    #chart{margin-top:.6rem}
    .err{color:#b02020;font-weight:600}
  </style>
</head>
<body>
  <h1>🌡️ Edlau — Thermisches Archiv (Daten-Monitor)</h1>
  <div id="status" class="muted">lade …</div>
  <div id="hadbg" class="muted" style="font-size:.8rem"></div>
  <div id="cards" class="cards"></div>
  <div id="chart"></div>
  <p class="muted">Innen = Messung (HA-Recorder, archiviert in /share) · Außen/Sonne/Wind = Open-Meteo.
     Serien in der Legende an/aus klickbar. (Modell-Schätzung ist geparkt — im Sommer nicht aussagekräftig.)</p>

  <script src="uPlot.iife.min.js"></script>
  <script>
    const fmt = (v,d=1) => (v==null||isNaN(v)) ? "–" : Number(v).toFixed(d);
    const lastNonNull = a => { for (let i=a.length-1;i>=0;i--) if (a[i]!=null) return a[i]; return null; };

    function summary(d){
      const el = document.getElementById("cards");
      const nIn = d.indoor_hours || 0;
      const tin = d.t_in ? lastNonNull(d.t_in) : null;
      const tout = d.t_out ? lastNonNull(d.t_out) : null;
      const span = d.time && d.time.length ? (d.time[d.time.length-1]-d.time[0])/86400 : 0;
      const items = [
        ["Innen aktuell", fmt(tin,1)+" °C", "Wohnzimmer"],
        ["Außen aktuell", fmt(tout,1)+" °C", "Open-Meteo"],
        ["Innen-Historie", nIn+" h", "≈ "+fmt(nIn/24,1)+" Tage"],
        ["Archiv-Spanne", fmt(span,1)+" d", (d.time?d.time.length:0)+" Stunden"],
      ];
      el.innerHTML = items.map(([t,v,s]) =>
        `<div class="card"><small>${t}</small><b>${v}</b><small>${s}</small></div>`).join("");
    }

    function draw(d){
      const data = [d.time, d.t_in, d.t_out, d.solar, d.wind];
      const w = Math.max(320, document.getElementById("chart").clientWidth || 900);
      const opts = {
        width:w, height:420,
        scales:{ x:{time:true}, C:{}, sun:{}, wind:{} },
        series:[
          {},
          {label:"Innen (gemessen)", scale:"C", stroke:"#c0392b", width:2, spanGaps:true},
          {label:"Außen",            scale:"C", stroke:"#2980b9", width:1, spanGaps:true},
          {label:"Sonne W/m²",       scale:"sun", stroke:"#e69510", width:1, spanGaps:true},
          {label:"Wind km/h",        scale:"wind", stroke:"#7f8c8d", width:1, show:false, spanGaps:true},
        ],
        axes:[ {}, {scale:"C", label:"°C"}, {scale:"sun", side:1, label:"W/m²", grid:{show:false}} ],
      };
      document.getElementById("chart").innerHTML = "";
      const u = new uPlot(opts, data, document.getElementById("chart"));
      window.addEventListener("resize", () =>
        u.setSize({width:Math.max(320,document.getElementById("chart").clientWidth), height:420}));
    }

    fetch("api/data").then(r=>r.json()).then(d=>{
      const h = d.ha_debug || {};
      document.getElementById("hadbg").innerHTML =
        "History: Status "+(h["hist-status"]??"–")+" · Rohpunkte "+(h["hist-raw"]??"–")
        +" | /states: Status "+(h["states-status"]??"–")
        +" | → "+(h.hours??0)+" Std · Sensor "+(h.sensor||"?")
        +(h.body ? "<br><code style='font-size:.72rem'>"+String(h.body).replace(/</g,"&lt;")+"</code>" : "");
      if (d.status !== "ok"){
        document.getElementById("status").textContent =
          "Status: "+(d.status||"?")+" — erster Abruf läuft, Seite in ~20 s neu laden.";
        return;
      }
      summary(d);
      if (!d.time || d.time.length===0){
        document.getElementById("status").textContent = "Status: ok — aber keine Daten im Archiv.";
        return;
      }
      document.getElementById("status").textContent = "Stand: "+(d.updated||"–");
      draw(d);
    }).catch(e=>{
      document.getElementById("status").innerHTML = '<span class="err">Fehler beim Laden: '+e+'</span>';
    });
  </script>
</body>
</html>
