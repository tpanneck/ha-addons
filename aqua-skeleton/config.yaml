# HA-Add-on-Manifest.
# Mit "image:" zieht HA ein VORGEBAUTES Image aus ghcr.io (kein lokaler Build,
# kein Docker-Hub-Rate-Limit) - gebaut von der GitHub-Action .github/workflows/build.yml.
name: "Aqua Skeleton"
version: "0.11.20"
slug: "aqua_skeleton"
image: "ghcr.io/tpanneck/{arch}-aqua_skeleton"
description: "Thermischer Daten-Monitor: Innen (HA) + Aussen/Sonne/Wind (Open-Meteo), Archiv in /share"
arch:
  - aarch64
  - amd64
init: false
# Ingress = eigene Web-UI in der HA-Sidebar, ohne offenen Port:
ingress: true
ingress_port: 8099
panel_icon: "mdi:home-thermometer"
# Der Supervisor injiziert damit automatisch SUPERVISOR_TOKEN fuer die HA-API.
homeassistant_api: true
# Persistenter Ordner, der auch Deinstallieren ueberlebt (Archiv landet hier):
map:
  - share:rw
# In der Add-on-Konfiguration aenderbar:
options:
  sensor: "sensor.wohnzimmer_shelly_2_temperatur"
  humidity_sensor: "sensor.wohnzimmer_shelly_2_luftfeuchtigkeit"
  latitude: 51.68
  longitude: 11.77
  days: 14
  c_mj: 290.0
  # auto = tau aus den Messdaten fitten (Sommer/ungeheizt); fixed = festes tau nutzen
  # (Winter/Heizbetrieb, wo der Freilauf-Fit nicht funktioniert). tau ist der freie Parameter,
  # C (c_mj) bleibt der Anker -> W/K = C/tau folgt automatisch.
  model_mode: "auto"
  fixed_tau: 7.0
  # Fuer die kW-Auslegungs-Kachel: Innen-Sollwert + Auslegungs-Aussentemperatur.
  frost_setpoint: 5.0
  design_outdoor: -15.0
schema:
  sensor: str
  humidity_sensor: str
  latitude: float
  longitude: float
  days: int
  c_mj: float
  model_mode: "list(auto|fixed)"
  fixed_tau: float
  frost_setpoint: float
  design_outdoor: float
