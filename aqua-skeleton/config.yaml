# HA-Add-on-Manifest. Weil kein "image:" angegeben ist, BAUT der Supervisor
# das Add-on lokal aus dem Dockerfile fuer die Architektur der Box.
name: "Aqua Skeleton"
version: "0.4.3"
slug: "aqua_skeleton"
description: "Thermischer Daten-Monitor: Innen (HA) + Aussen/Sonne/Wind (Open-Meteo), Archiv in /share"
arch:
  - aarch64
  - amd64
  - armv7
init: false
# Ingress = eigene Web-UI in der HA-Sidebar, ohne offenen Port:
ingress: true
ingress_port: 8099
panel_icon: "mdi:home-thermometer"
# Der Supervisor injiziert damit automatisch SUPERVISOR_TOKEN fuer die HA-API.
homeassistant_api: true
# Persistenter Ordner, der auch Deinstallieren ueberlebt (Archiv landet hier):
map:
  - share:rw
# In der Add-on-Konfiguration aenderbar:
options:
  sensor: "sensor.wohnzimmer_shelly_2_temperatur"
  latitude: 51.68
  longitude: 11.77
  days: 14
schema:
  sensor: str
  latitude: float
  longitude: float
  days: int
