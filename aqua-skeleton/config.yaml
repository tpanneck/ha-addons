# HA-Add-on-Manifest. Weil kein "image:" angegeben ist, BAUT der Supervisor
# das Add-on lokal aus dem Dockerfile fuer die Architektur der Box.
name: "Aqua Skeleton"
version: "0.2.0"
slug: "aqua_skeleton"
description: "Test-Add-on (Babashka): liest ueber die HA-API einen Sensor + Ingress-Seite"
arch:
  - aarch64
  - amd64
  - armv7
init: false
# Ingress = eigene Web-UI in der HA-Sidebar, ohne offenen Port:
ingress: true
ingress_port: 8099
panel_icon: "mdi:water-pump"
# Der Supervisor injiziert damit automatisch SUPERVISOR_TOKEN fuer die HA-API.
homeassistant_api: true
# Welcher Sensor auf der Seite angezeigt wird - in der Add-on-Konfiguration aenderbar.
options:
  sensor: "sensor.shellyhtg3_80b54e335734_temperatur"
schema:
  sensor: str
