name: Build add-on image

on:
  push:
    branches: [main]
    paths:
      - "aqua-skeleton/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.ha_arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: aarch64
            platform: linux/arm64
          - ha_arch: amd64
            platform: linux/amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: meta
        run: |
          v="$(grep -E '^version:' aqua-skeleton/config.yaml | head -1 | cut -d'"' -f2)"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Add-on-Version: $v"

      - name: Build & push ${{ matrix.ha_arch }}
        uses: docker/build-push-action@v6
        with:
          context: aqua-skeleton
          file: aqua-skeleton/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: |
            ghcr.io/tpanneck/${{ matrix.ha_arch }}-aqua_skeleton:${{ steps.meta.outputs.version }}
            ghcr.io/tpanneck/${{ matrix.ha_arch }}-aqua_skeleton:latest
